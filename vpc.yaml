AWSTemplateFormatVersion: '2010-09-09'
Description: VPC, subnets, route tables, IGW, NAT gateway, and VPC endpoints

Parameters:
  EnvName:
    Type: String
    Description: Environment name (e.g. dev, staging, prod)

  VpcCidr:
    Type: String
    Description: CIDR block for the VPC

  PublicSubnet1Cidr:
    Type: String
    Description: CIDR block for public subnet 1a

  PublicSubnet2Cidr:
    Type: String
    Description: CIDR block for public subnet 1b

  PrivateSubnet1Cidr:
    Type: String
    Description: CIDR block for private subnet 1a

  PrivateSubnet2Cidr:
    Type: String
    Description: CIDR block for private subnet 1b

  DBSubnet1Cidr:
    Type: String
    Description: CIDR block for DB subnet 1a

  DBSubnet2Cidr:
    Type: String
    Description: CIDR block for DB subnet 1b

Resources:
# Build VPC
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvName}-vpc'

# Build internet gateway
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: Internet Gateway

# Attach internet gateway to the VPC
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref 'VPC'
      InternetGatewayId: !Ref 'InternetGateway'

# Build Public subnets
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ]
      Tags:
        - Key: Name
          Value: !Sub Public subnet 1a
        - Key: Network
          Value: Public
      MapPublicIpOnLaunch: true

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ]
      Tags:
        - Key: Name
          Value: !Sub Public subnet 1b
        - Key: Network
          Value: Public
      MapPublicIpOnLaunch: true

# Build Private subnets
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ]
      Tags:
        - Key: Name
          Value: Private subnet 1a
        - Key: Network
          Value: Private

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ]
      Tags:
        - Key: Name
          Value: Private subnet 1b
        - Key: Network
          Value: Private

# Build DB subnets
  DBSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref DBSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ]
      Tags:
        - Key: Name
          Value: DB subnet 1a

  DBSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref DBSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ]
      Tags:
        - Key: Name
          Value: DB subnet 1b

# Build route tables for public subnets
  PublicSubnetRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: Public Subnets
        - Key: Network
          Value: Public

  PublicSubnetRoute:
    DependsOn: VPCGatewayAttachment
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref 'PublicSubnetRouteTable'
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref 'InternetGateway'

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref 'PublicSubnet1'
      RouteTableId: !Ref 'PublicSubnetRouteTable'

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref 'PublicSubnet2'
      RouteTableId: !Ref 'PublicSubnetRouteTable'

# Build NAT gateway
  NatGEWEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
       - Key: Name
         Value: NatGW-EIP

  NatGateway:
    DependsOn: VPCGatewayAttachment
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt 'NatGEWEIP.AllocationId'
      SubnetId: !Ref 'PublicSubnet1'

# Build route tables for private subnets
  PrivateSubnetRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: Private Subnets
        - Key: Network
          Value: Private

  DBSubnetRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: DB Subnets

  PrivateSubnetRoute:
    DependsOn: NatGateway
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateSubnetRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref 'PrivateSubnet1'
      RouteTableId: !Ref 'PrivateSubnetRouteTable'

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref 'PrivateSubnet2'
      RouteTableId: !Ref 'PrivateSubnetRouteTable'

  DBSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref 'DBSubnet1'
      RouteTableId: !Ref 'DBSubnetRouteTable'

  DBSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref 'DBSubnet2'
      RouteTableId: !Ref 'DBSubnetRouteTable'

#build S3 endpoint
  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      RouteTableIds:
        - !Ref PublicSubnetRouteTable
        - !Ref PrivateSubnetRouteTable
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3

#Parameter store resources
  VPCIDParam:
    Type: AWS::SSM::Parameter
    Properties:
      Type: String
      Name: !Sub '/net/vpc/id'
      Value: !Ref VPC

  VPCCIDRParam:
    Type: AWS::SSM::Parameter
    Properties:
      Type: String
      Name: /net/vpc/cidr
      Value: !Ref VpcCidr

  PublicSubnet1Param:
    Type: AWS::SSM::Parameter
    Properties:
      Type: String
      Name: !Sub '/net/subnets/publicsubnet1/id'
      Value: !Ref PublicSubnet1

  PublicSubnet2Param:
    Type: AWS::SSM::Parameter
    Properties:
      Type: String
      Name: !Sub '/net/subnets/publicsubnet2/id'
      Value: !Ref PublicSubnet2

  PrivateSubnet1Param:
    Type: AWS::SSM::Parameter
    Properties:
      Type: String
      Name: !Sub '/net/subnets/privatesubnet1/id'
      Value: !Ref PrivateSubnet1

  PrivateSubnet2Param:
    Type: AWS::SSM::Parameter
    Properties:
      Type: String
      Name:  !Sub '/net/subnets/privatesubnet2/id'
      Value: !Ref PrivateSubnet2

  DBSubnet1Param:
    Type: AWS::SSM::Parameter
    Properties:
      Type: String
      Name: !Sub '/net/subnets/dbsubnet1/id'
      Value: !Ref DBSubnet1

  DBSubnet2Param:
    Type: AWS::SSM::Parameter
    Properties:
      Type: String
      Name: /net/subnets/dbsubnet2/id
      Value: !Ref DBSubnet2

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VpcId'

  PublicSubnet1Id:
    Description: Public Subnet 1a ID
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnet1Id'

  PublicSubnet2Id:
    Description: Public Subnet 1b ID
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnet2Id'

  PrivateSubnet1Id:
    Description: Private Subnet 1a ID
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet1Id'

  PrivateSubnet2Id:
    Description: Private Subnet 1b ID
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet2Id'

  DBSubnet1Id:
    Description: DB Subnet 1a ID
    Value: !Ref DBSubnet1
    Export:
      Name: !Sub '${AWS::StackName}-DBSubnet1Id'

  DBSubnet2Id:
    Description: DB Subnet 1b ID
    Value: !Ref DBSubnet2
    Export:
      Name: !Sub '${AWS::StackName}-DBSubnet2Id'